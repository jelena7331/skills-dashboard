<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills 仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --amazon-dark:#232f3e;--amazon-orange:#ff9900;--amazon-blue:#146eb4;
  --bg:#fafafa;--card:#fff;--border:#e0e0e0;--text:#1a1a1a;--text-sec:#666;--text-hint:#999;
  --cat-amazon:#ff9900;--cat-brand:#8E44AD;--cat-content:#1E8449;--cat-company:#117A65;--cat-collab:#185FA5;--cat-system:#5F5E5A;--cat-builtin:#888780;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:24px 20px 60px}

.header{background:var(--amazon-dark);border-radius:16px;padding:28px 32px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header-left h1{color:#fff;font-size:24px;font-weight:600;margin-bottom:4px}
.header-left p{color:#ff9900;font-size:13px}
.header-right{display:flex;gap:12px;flex-wrap:wrap}
.stat-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 18px;text-align:center}
.stat-pill .num{color:#fff;font-size:22px;font-weight:600;line-height:1.2}
.stat-pill .label{color:rgba(255,255,255,0.6);font-size:11px}

.toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card);outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--amazon-orange)}
.search-box .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:16px}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all 0.2s;white-space:nowrap}
.chip:hover{border-color:var(--amazon-orange)}
.chip.active{background:var(--amazon-dark);color:#fff;border-color:var(--amazon-dark)}
.chip .count{font-size:11px;opacity:0.7;margin-left:4px}

.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all 0.2s}
.tab:hover{border-color:var(--amazon-orange)}
.tab.active{background:var(--amazon-dark);color:#fff;border-color:var(--amazon-dark)}

.scan-info{text-align:right;font-size:12px;color:var(--text-hint);margin-bottom:16px}

.prompt-section{margin-bottom:28px}
.prompts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prompt-skill{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column}
.prompt-skill-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prompt-skill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.prompt-skill-id{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--text-hint)}
.prompt-skill-name{font-size:14px;font-weight:600}
.prompt-list{display:flex;flex-direction:column;gap:8px;flex:1}
.prompt-item{background:#f8f9fa;border-radius:8px;padding:10px 14px;cursor:pointer;transition:all 0.15s;border-left:3px solid var(--border)}
.prompt-item:hover{background:#fff;border-left-color:var(--amazon-orange);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.prompt-label{font-size:11px;color:var(--amazon-orange);font-weight:600;margin-bottom:2px}
.prompt-text{font-size:13px;color:var(--text)}



.category-section{margin-bottom:32px}
.category-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.category-dot{width:10px;height:10px;border-radius:50%}
.category-title{font-size:16px;font-weight:600}
.category-count{font-size:13px;color:var(--text-sec)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:all 0.2s;cursor:pointer;position:relative;overflow:hidden}
.skill-card:hover{transform:translateY(-1px)}
.skill-card[data-cat="amazon"]:hover{border-color:var(--cat-amazon);box-shadow:0 2px 12px rgba(255,153,0,0.14)}
.skill-card[data-cat="brand-marketing"]:hover{border-color:var(--cat-brand);box-shadow:0 2px 12px rgba(142,68,173,0.14)}
.skill-card[data-cat="content"]:hover{border-color:var(--cat-content);box-shadow:0 2px 12px rgba(30,132,73,0.14)}
.skill-card[data-cat="company"]:hover{border-color:var(--cat-company);box-shadow:0 2px 12px rgba(17,122,101,0.14)}
.skill-card[data-cat="collaboration"]:hover{border-color:var(--cat-collab);box-shadow:0 2px 12px rgba(24,95,165,0.14)}
.skill-card[data-cat="system"]:hover{border-color:var(--cat-system);box-shadow:0 2px 12px rgba(95,94,90,0.14)}
.skill-card[data-cat="builtin"]:hover{border-color:var(--cat-builtin);box-shadow:0 2px 12px rgba(136,135,128,0.14)}
.skill-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.skill-card[data-cat="amazon"]::before{background:var(--cat-amazon)}
.skill-card[data-cat="brand-marketing"]::before{background:var(--cat-brand)}
.skill-card[data-cat="content"]::before{background:var(--cat-content)}
.skill-card[data-cat="company"]::before{background:var(--cat-company)}
.skill-card[data-cat="collaboration"]::before{background:var(--cat-collab)}
.skill-card[data-cat="system"]::before{background:var(--cat-system)}
.skill-card[data-cat="builtin"]::before{background:var(--cat-builtin)}
.card-id{font-family:'SF Mono',Consolas,monospace;font-size:12px;color:var(--text-sec);margin-bottom:2px}
.card-name{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}
.card-desc{font-size:12px;color:var(--text-sec);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.badge-active{background:#e8f5e9;color:#2e7d32}
.badge-planned{background:#fff3e0;color:#e65100}
.badge-new{background:#e3f2fd;color:#1565c0}
.badge-removed{background:#fbe9e7;color:#c62828}
.badge-unclassified{background:#fff9c4;color:#f57f17}
.card-date{font-size:11px;color:var(--text-hint)}

.builtin-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.builtin-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.builtin-item .bi-id{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--text-sec)}
.builtin-item .bi-name{font-size:12px;font-weight:500}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-hint)}
.empty-state .icon{font-size:48px;margin-bottom:12px}

.footer{text-align:center;padding:24px 0 0;border-top:1px solid var(--border);margin-top:40px}
.footer p{font-size:12px;color:var(--text-hint)}
.footer a{color:var(--amazon-blue);text-decoration:none}

@media(max-width:1024px){
  .prompts-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .header{flex-direction:column;text-align:center}
  .cards-grid{grid-template-columns:1fr}
  .prompts-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-left">
    <h1>Skills 仪表盘</h1>
    <p>米谷 AI 技能管理中心</p>
  </div>
  <div class="header-right" id="stats"></div>
</div>

<div class="tabs">
  <div class="tab" data-tab="skills" onclick="setTab('skills')">&#128193; 技能清单</div>
  <div class="tab" data-tab="prompts" onclick="setTab('prompts')">&#9998; 提示词指南</div>
</div>
<script>
(function(){
  var t = location.hash.replace('#','') || 'skills';
  document.querySelectorAll('.tab').forEach(function(e){
    e.classList.toggle('active', e.dataset.tab === t);
  });
})();
</script>

<div class="toolbar">
  <div class="search-box">
    <span class="icon">&#128269;</span>
    <input type="text" id="search" placeholder="搜索技能名称或描述...">
  </div>
  <div class="filter-chips" id="filters"></div>
</div>

<div class="scan-info" id="scanInfo"></div>

<div id="content"></div>

<div class="footer">
  <p>Skills Dashboard v1.0 &middot; <a href="javascript:void(0)" onclick="rescan()">🔄 同步数据</a> &middot; 数据源: <code>~/.workbuddy/skills/</code></p>
</div>

</div>

<script>
let REGISTRY = null;
let activeFilter = 'all';
let searchTerm = '';
let activeTab = location.hash.replace('#','') || 'skills';

async function loadRegistry() {
  try {
    const res = await fetch('registry.json?t=' + Date.now());
    REGISTRY = await res.json();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">&#9888;</div><p>无法加载 registry.json，请确保文件与此 HTML 在同一目录</p></div>';
  }
}

function getCatColor(cat) {
  const c = REGISTRY.categories.find(c => c.id === cat);
  return c ? c.color : '#999';
}

function getCatName(cat) {
  const c = REGISTRY.categories.find(c => c.id === cat);
  return c ? c.name_cn : '未分类';
}

function render() {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === activeTab);
  });
  renderStats();
  renderFilters();
  renderScanInfo();
  if (activeTab === 'skills') renderSkillList();
  else renderPromptGuide();
}

function renderStats() {
  const skills = REGISTRY.skills;
  const active = skills.filter(s => s.status === 'active' && s.source === 'user').length;
  const builtin = skills.filter(s => s.source === 'builtin').length;
  const total = skills.length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-pill"><div class="num">${active}</div><div class="label">用户技能</div></div>
    <div class="stat-pill"><div class="num">${builtin}</div><div class="label">内置</div></div>
    <div class="stat-pill"><div class="num">${total}</div><div class="label">总计</div></div>
  `;
}

function renderFilters() {
  const userCats = REGISTRY.categories;
    let chips = `<div class="chip${activeFilter === 'all' ? ' active' : ''}" data-cat="all" onclick="setFilter('all')">全部<span class="count">${REGISTRY.skills.filter(s => s.status !== 'removed').length}</span></div>`;
    for (const cat of userCats) {
        const count = REGISTRY.skills.filter(s => s.category === cat.id && s.status !== 'removed').length;
    if (count === 0) continue;
    chips += `<div class="chip${activeFilter === cat.id ? ' active' : ''}" data-cat="${cat.id}" onclick="setFilter('${cat.id}')">${cat.name_cn}<span class="count">${count}</span></div>`;
  }
  document.getElementById('filters').innerHTML = chips;
}

function renderScanInfo() {
  const ts = REGISTRY.last_scanned || '未知';
  const d = new Date(ts);
  const formatted = isNaN(d) ? ts : d.toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('scanInfo').textContent = '最后扫描: ' + formatted;
}

function renderSkillList() {
  const skills = REGISTRY.skills.filter(s => {
    if (s.status === 'removed') return false;
    if (activeFilter !== 'all' && s.category !== activeFilter) return false;
    if (searchTerm) {
      const term = searchTerm.toLowerCase();
      return s.id.toLowerCase().includes(term) ||
             (s.name_cn && s.name_cn.includes(searchTerm)) ||
             (s.description && s.description.toLowerCase().includes(term));
    }
    return true;
  });

  if (skills.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">&#128533;</div><p>没有匹配的技能</p></div>';
    return;
  }

  const grouped = {};
  for (const s of skills) {
    const cat = s.category || 'uncategorized';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(s);
  }

  let html = '';
  const catOrder = REGISTRY.categories.map(c => c.id).concat(['uncategorized']);

  for (const cat of catOrder) {
    if (!grouped[cat]) continue;
    const items = grouped[cat];
    const isBuiltin = cat === 'builtin';

    html += `<div class="category-section">`;
    html += `<div class="category-header">`;
    html += `<div class="category-dot" style="background:${getCatColor(cat)}"></div>`;
    html += `<div class="category-title">${getCatName(cat)}</div>`;
    html += `<div class="category-count">${items.length} 个</div>`;
    html += `</div>`;

    if (isBuiltin) {
      html += `<div class="builtin-list">`;
      for (const s of items) {
        html += `<div class="builtin-item"><span class="bi-name">${s.name_cn || ''}</span><span class="bi-id">${s.id}</span></div>`;
      }
      html += `</div>`;
    } else {
      html += `<div class="cards-grid">`;
      for (const s of items) {
        const badgeClass = 'badge-' + (s.status || 'active');
        const badgeText = {active:'活跃', planned:'待建', new:'新增', removed:'已删除', unclassified:'未分类'}[s.status] || s.status;
        html += `<div class="skill-card" data-cat="${cat}" onclick="copyId('${s.id}')">`;
        html += `<div class="card-id">${s.id}</div>`;
        html += `<div class="card-name">${s.name_cn || '<span style="color:#999">未命名</span>'}</div>`;
        html += `<div class="card-desc">${s.description || ''}</div>`;
        html += `<div class="card-footer">`;
        html += `<span class="badge ${badgeClass}">${badgeText}</span>`;
        html += `<span class="card-date">${s.updated_at || s.installed_at || ''}</span>`;
        html += `</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function renderPromptGuide() {
  const skills = REGISTRY.skills.filter(s => {
    if (s.status === 'removed') return false;
    if (activeFilter !== 'all' && s.category !== activeFilter) return false;
    if (searchTerm) {
      const term = searchTerm.toLowerCase();
      return s.id.toLowerCase().includes(term) ||
             (s.name_cn && s.name_cn.includes(searchTerm)) ||
             (s.description && s.description.toLowerCase().includes(term)) ||
             (s.prompts && s.prompts.some(p => p.text && p.text.toLowerCase().includes(term)));
    }
    return true;
  }).filter(s => s.prompts && s.prompts.length > 0);

  if (skills.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">&#128533;</div><p>没有匹配的提示词</p></div>';
    return;
  }

  const grouped = {};
  for (const s of skills) {
    const cat = s.category || 'uncategorized';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(s);
  }

  let html = '';
  const catOrder = REGISTRY.categories.map(c => c.id).concat(['uncategorized']);

  for (const cat of catOrder) {
    if (!grouped[cat]) continue;
    const items = grouped[cat];

    html += `<div class="prompt-section">`;
    html += `<div class="category-header">`;
    html += `<div class="category-dot" style="background:${getCatColor(cat)}"></div>`;
    html += `<div class="category-title">${getCatName(cat)}</div>`;
    html += `<div class="category-count">${items.length} 个技能</div>`;
    html += `</div>`;

    html += `<div class="prompts-grid">`;
    for (const s of items) {
      html += `<div class="prompt-skill">`;
      html += `<div class="prompt-skill-header">`;
      html += `<div class="prompt-skill-dot" style="background:${getCatColor(cat)}"></div>`;
      html += `<span class="prompt-skill-name">${s.name_cn || s.id}</span>`;
      html += `<span class="prompt-skill-id">${s.id}</span>`;
      html += `</div>`;
      html += `<div class="prompt-list">`;
      for (const p of s.prompts) {
        const safeText = p.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        html += `<div class="prompt-item" onclick="copyText('${safeText}')">`;
        html += `<div class="prompt-label">${p.label || '提示词'}</div>`;
        html += `<div class="prompt-text">${p.text}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
      html += `</div>`;
    }
    html += `</div>`;

    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.cat === cat);
  });
  render();
}

function setTab(tab) {
  activeTab = tab;
  location.hash = tab === 'skills' ? '' : tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  render();
}

document.getElementById('search').addEventListener('input', function(e) {
  searchTerm = e.target.value.trim();
  render();
});

function copyId(id) {
  navigator.clipboard.writeText(id).then(() => {
    showToast('已复制 Skill ID: ' + id);
  }).catch(() => {});
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制提示词');
  }).catch(() => {});
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#232f3e;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function rescan() {
  showToast('在 WorkBuddy 终端运行: bash deploy.sh (一键扫描+部署)');
}

loadRegistry();
</script>
</body>
</html>
